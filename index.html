<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pump Controller Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            --card-bg: rgba(22, 30, 49, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.25);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #38bdf8, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: -0.02em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .mzaxa-title { color: #38bdf8; }
        .ber-title { color: #34d399; }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        button {
            border: none;
            padding: 18px 10px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-on {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .btn-off {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            color: white;
            box-shadow: 0 4px 14px var(--danger-glow);
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>سیستەمی ئاودان</h1>
            <p>ژمارەی : 07507617224</p>
        </header>

        <div class="card">
            <div class="card-title mzaxa-title">مزەخە</div>
            <div class="btn-container">
                <button class="btn-on" onclick="sendSms('#PWD654321#RLOP1=1')">پێکردن</button>
                <button class="btn-off" onclick="sendSms('#PWD654321#RLOP1=0')">کوژاندنەوە</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title ber-title">بیر</div>
            <div class="btn-container">
                <button class="btn-on" onclick="sendSms('#PWD654321#RLOP2=1')">پێکردن</button>
                <button class="btn-off" onclick="sendSms('#PWD654321#RLOP2=0')">کوژاندنەوە</button>
            </div>
        </div>
    </div>

    <script>
        const PHONE_NUMBER = "07507617224";

        function sendSms(commandBody) {
            // Instantly hooks into native iOS SMS application
            window.location.href = `sms:${PHONE_NUMBER}&body=${encodeURIComponent(commandBody)}`;
        }
    </script>
</body>
</html>
